<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>小數冒險家：細節優化版</title>
    <style>
        :root {
            --gold: #FFD700;
            --magic-blue: #1a2a6c;
            --magic-glow: #00d2ff;
            --scroll-bg: rgba(255, 255, 255, 0.9);
            --danger: #ff4757;
            --text-dark: #2d3436;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; padding: 0;
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            background-color: #000;
            height: 100dvh; 
            overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
            transition: background 0.8s ease-in-out;
        }

        /* 背景圖片設定 */
        .bg-home { background: url('Gemini_Generated_Image_oblnfvoblnfvobln.png') no-repeat center center/cover; }
        .bg-island-0 { background: url('Gemini_Generated_Image_hgqcj2hgqcj2hgqc.png') no-repeat center center/cover; }
        .bg-island-1 { background: url('Gemini_Generated_Image_q6ayfvq6ayfvq6ay.png') no-repeat center center/cover; }
        .bg-island-2 { background: url('Gemini_Generated_Image_aiv0ynaiv0ynaiv0.png') no-repeat center center/cover; }
        .bg-island-3 { background: url('Gemini_Generated_Image_qwllskqwllskqwll.png') no-repeat center center/cover; }
        .bg-island-4 { background: url('Gemini_Generated_Image_46lexo46lexo46le.png') no-repeat center center/cover; }

        .screen { 
            display: none; width: 100%; height: 100%; 
            flex-direction: column; align-items: center; 
            padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px;
        }
        .active-screen { display: flex; }

        #home-screen { justify-content: center; background: rgba(0,0,0,0.3); }
        .home-title { font-size: clamp(24px, 8vw, 42px); color: var(--gold); text-shadow: 2px 2px 15px black; margin-bottom: 30px; text-align: center; font-weight: bold; }
        .island-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 500px; padding: 10px; }
        .big-island-btn { background: rgba(255, 255, 255, 0.9); color: var(--text-dark); border: 3px solid var(--gold); padding: 20px 10px; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .nav-bar { width: 100%; display: flex; background: rgba(0,0,0,0.85); padding: 8px 5px; gap: 5px; justify-content: center; flex-wrap: wrap; }
        .nav-btn { padding: 6px 10px; border-radius: 8px; background: #333; color: white; border: 1px solid var(--gold); font-size: clamp(10px, 3vw, 14px); cursor: pointer; }
        .nav-btn.active { background: var(--magic-blue); border-color: var(--magic-glow); box-shadow: 0 0 8px var(--magic-glow); }

        .info-bar { display: flex; justify-content: space-between; width: 100%; max-width: 650px; padding: 10px 5px; color: white; align-items: center; text-shadow: 1px 1px 5px black; }
        .stat-box { background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 8px; border: 1px solid var(--gold); font-family: monospace; font-size: 16px; }

        .game-main {
            background: var(--scroll-bg); width: 100%; max-width: 650px;
            padding: 20px 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center; color: var(--text-dark);
            border: 4px solid var(--gold); position: relative; margin-bottom: 10px;
        }

        .quest-area { font-size: clamp(20px, 5vw, 28px); font-weight: 800; text-align: center; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }

        /* 數字線容器 */
        .number-line-container { width: 100%; overflow-x: auto; padding: 10px 0; -webkit-overflow-scrolling: touch; }
        .number-line { 
            display: flex; 
            align-items: flex-end; /* 關鍵：讓所有元素底部對齊 */
            justify-content: center; 
            min-width: max-content; 
            padding: 0 20px; 
            height: 80px; 
        }
        
        .slot { width: 12px; height: 40px; background: rgba(0,0,0,0.05); margin: 0 4px; border-radius: 3px; cursor: pointer; flex-shrink: 0; margin-bottom: 8px; }
        
        /* 修正後的小數點樣式 */
        .decimal-point { 
            width: 12px; 
            height: 12px; 
            background: var(--danger); 
            border-radius: 50%; 
            box-shadow: 0 0 5px var(--danger); 
            z-index: 10; 
            cursor: pointer; 
            flex-shrink: 0;
            margin: 0 4px 12px 4px; /* 底部邊距讓它對齊數字基線 */
            position: relative;
        }
        /* 增加隱形點擊範圍，方便觸控 */
        .decimal-point::after {
            content: '';
            position: absolute;
            top: -15px; left: -15px; right: -15px; bottom: -15px;
        }

        .digit { display: inline-block; width: 32px; text-align: center; font-size: 45px; font-weight: bold; line-height: 1; }
        .digit.ghost { color: rgba(0, 0, 0, 0.1); }

        .dialog-box { background: rgba(255, 255, 255, 0.8); width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #999; min-height: 60px; font-size: 16px; margin-bottom: 15px; }
        .input-group { display: flex; align-items: center; gap: 8px; width: 100%; }
        input[type="text"] { flex: 1; padding: 12px; font-size: 24px; border-radius: 8px; border: 2px solid #ccc; text-align: center; }
        .btn-submit { padding: 12px 20px; background: var(--magic-blue); color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }

        .back-home-btn { margin-top: auto; margin-bottom: 20px; background: rgba(0,0,0,0.7); color: white; border: 1px solid white; padding: 8px 20px; border-radius: 20px; font-size: 14px; cursor: pointer; }

        @media (max-width: 400px) {
            .digit { width: 24px; font-size: 34px; }
            .slot { width: 8px; }
        }
    </style>
</head>
<body id="main-body" class="bg-home">

<div id="home-screen" class="screen active-screen">
    <div class="home-title">💎 小數冒險家 💎<br><span style="font-size:18px; color:white;">單位化聚大傳送</span></div>
    <div class="island-grid">
        <button class="big-island-btn" onclick="startAdventure(0)">💰 金幣之森</button>
        <button class="big-island-btn" onclick="startAdventure(1)">❄️ 長度冰原</button>
        <button class="big-island-btn" onclick="startAdventure(2)">⛲ 容量噴泉</button>
        <button class="big-island-btn" onclick="startAdventure(3)">⛰️ 重量巨山</button>
        <button class="big-island-btn" onclick="startAdventure(4)" style="grid-column: span 1; background: var(--gold);">🏛️ 終極神殿</button>
    </div>
</div>

<div id="game-screen" class="screen">
    <div class="nav-bar" id="nav-bar"></div>
    <div class="info-bar">
        <div id="island-title" style="font-size: 14px;"></div>
        <div class="stat-box">得分: <span id="score-val" class="score-display">0</span></div>
        <div class="stat-box" id="timer-display">00:00</div>
    </div>

    <div class="game-main">
        <div class="quest-area">
            <span id="quest-text"></span>
            <span id="hint-arrow" style="font-size: 30px;"></span>
        </div>
        <div class="number-line-container">
            <div class="number-line" id="number-line"></div>
        </div>
        <div class="dialog-box" id="msg-box"></div>
        <div class="input-group">
            <input type="text" id="answer-input" inputmode="decimal" placeholder="答案" autocomplete="off">
            <span id="unit-tag" style="font-size:20px; font-weight:bold; min-width:50px;"></span>
            <button class="btn-submit" onclick="checkFinalAnswer()">提交</button>
        </div>
    </div>
    <button class="back-home-btn" onclick="goHome()">返回地圖</button>
</div>

<script>
    // JavaScript 部分保持不變，與之前的邏輯一致
    const islandData = [
        { name: "金幣之森", icon: "💰", units: [["元", "角", 10]] },
        { name: "長度冰原", icon: "❄️", units: [["公里", "米", 1000], ["米", "厘米", 100], ["厘米", "毫米", 10]] },
        { name: "容量噴泉", icon: "⛲", units: [["升", "毫升", 1000]] },
        { name: "重量巨山", icon: "⛰️", units: [["公斤", "克", 1000]] },
        { name: "終極神殿", icon: "🏛️", isMixed: true }
    ];

    let currentIslandIdx = 0, islandProgress = 0, totalScore = 0;
    let currentQuestion = null, currentDotPos = 0, digits = [], initialDotPos = 0;
    let timerInterval = null, seconds = 0, isTransitioning = false;
    let completedIslands = new Set();

    function changeBackground(idx) {
        const body = document.getElementById('main-body');
        body.className = '';
        body.classList.add(idx === -1 ? 'bg-home' : `bg-island-${idx}`);
    }

    function switchIsland(idx) {
        if (isTransitioning) return;
        currentIslandIdx = idx; islandProgress = 0;
        changeBackground(idx);
        updateNavBar();
        initQuestion();
    }

    function startAdventure(idx) {
        currentIslandIdx = idx; islandProgress = 0;
        changeBackground(idx);
        document.getElementById('home-screen').classList.remove('active-screen');
        document.getElementById('game-screen').classList.add('active-screen');
        updateNavBar();
        if (!timerInterval) resetTimer();
        initQuestion();
    }

    function goHome() { 
        clearInterval(timerInterval); timerInterval = null;
        changeBackground(-1);
        document.getElementById('game-screen').classList.remove('active-screen'); 
        document.getElementById('home-screen').classList.add('active-screen'); 
    }

    function updateNavBar() {
        const bar = document.getElementById('nav-bar'); bar.innerHTML = '';
        islandData.forEach((isl, i) => {
            const btn = document.createElement('button');
            btn.className = `nav-btn ${i === currentIslandIdx ? 'active' : ''}`;
            btn.innerHTML = `${isl.icon} ${isl.name}`;
            btn.onclick = () => switchIsland(i);
            bar.appendChild(btn);
        });
    }

    function initQuestion() {
        isTransitioning = false;
        let isl = islandData[currentIslandIdx];
        const isTemple = (currentIslandIdx === 4);
        if (isTemple) isl = islandData[Math.floor(Math.random() * 4)];
        const unitPair = isl.units[Math.floor(Math.random() * isl.units.length)];
        const [bigU, smallU, rate] = unitPair;
        
        let isBigToSmall = Math.random() > 0.5;
        const steps = Math.log10(rate);
        let baseNum = Math.floor(Math.random() * 85) + 15;
        let start, target, targetUnit, sourceUnit;

        if (isBigToSmall) {
            start = (baseNum / 10).toString(); if (!start.includes('.')) start += ".";
            target = (parseFloat(start) * rate).toString(); targetUnit = smallU; sourceUnit = bigU;
        } else {
            start = (baseNum).toString() + ".";
            target = (parseFloat(start) / rate).toString(); targetUnit = bigU; sourceUnit = smallU;
        }

        currentQuestion = { start, target, steps, isBigToSmall, sourceUnit, targetUnit, rate, isTemple };
        
        document.getElementById('island-title').innerText = `${islandData[currentIslandIdx].icon} 進度: ${islandProgress + 1}/7`;
        document.getElementById('quest-text').innerText = `${start.replace(/\.$/,"")} ${sourceUnit} = ______ ${targetUnit}`;
        document.getElementById('unit-tag').innerText = targetUnit;
        document.getElementById('answer-input').value = "";

        const showHint = islandProgress < 5;
        const arrowEl = document.getElementById('hint-arrow');
        if (showHint && islandProgress < 3) {
            arrowEl.innerText = isBigToSmall ? "➡️" : "⬅️";
            arrowEl.style.display = "inline-block";
        } else { arrowEl.style.display = "none"; }

        const msgBox = document.getElementById('msg-box');
        if (showHint) {
            const relation = isBigToSmall ? "大化小 (×)" : "小化大 (÷)";
            msgBox.innerHTML = `<b>[提示]</b> ${relation}，進率 ${rate}，小數點向 <b>${isBigToSmall?"右":"左"}</b> 移 <b>${steps}</b> 位。`;
        } else { msgBox.innerHTML = "🌟 <b>冒險挑戰：</b>無提示題，分數加倍！"; }

        digits = currentQuestion.start.replace('.', '').split('');
        initialDotPos = currentQuestion.start.indexOf('.');
        if (initialDotPos === -1) initialDotPos = digits.length;
        currentDotPos = initialDotPos;
        renderDigits();
    }

    function renderDigits() {
        const line = document.getElementById('number-line'); line.innerHTML = '';
        for (let i = -3; i <= digits.length + 3; i++) {
            if (i === currentDotPos) {
                const dot = document.createElement('div'); dot.className = 'decimal-point'; line.appendChild(dot);
            } else {
                const slot = document.createElement('div'); slot.className = 'slot'; 
                slot.onclick = () => { if(!isTransitioning){ currentDotPos = i; renderDigits(); } };
                line.appendChild(slot);
            }
            if (i < digits.length + 3) {
                const span = document.createElement('span'); span.className = 'digit';
                let val = "0", isSolid = false;
                if (i >= 0 && i < digits.length) { val = digits[i]; isSolid = true; }
                else if (currentDotPos <= 0 && i >= currentDotPos - 1 && i < 0) { isSolid = true; }
                else if (currentDotPos > digits.length && i >= digits.length && i < currentDotPos) { isSolid = true; }
                span.innerText = val; span.className = isSolid ? "digit solid" : "digit ghost";
                line.appendChild(span);
            }
        }
    }

    function checkFinalAnswer() {
        if(isTransitioning) return;
        const userVal = document.getElementById('answer-input').value.trim();
        if (!userVal) return;
        const isValCorrect = parseFloat(userVal) === parseFloat(currentQuestion.target);
        const moveDist = currentDotPos - initialDotPos;
        const expectedDist = currentQuestion.isBigToSmall ? currentQuestion.steps : -currentQuestion.steps;
        const isPosCorrect = moveDist === expectedDist;
        if (isValCorrect && isPosCorrect) {
            isTransitioning = true;
            let points = currentQuestion.isTemple ? (islandProgress < 5 ? 20 : 30) : (islandProgress < 5 ? 10 : 20);
            totalScore += points;
            document.getElementById('score-val').innerText = totalScore;
            say(`🌟 完美！+${points}分！`);
            islandProgress++;
            setTimeout(handleProgression, 1200);
        } else { 
            say(isValCorrect ? "❌ 數值對了，但小數點位置不對！" : "❌ 數值有誤，請檢查後再提交！");
        }
    }

    function handleProgression() {
        if (islandProgress >= 7 && currentIslandIdx < 4) {
            completedIslands.add(currentIslandIdx);
            if (completedIslands.size >= 4) {
                say("🏆 全島達成！進入終極神殿！");
                setTimeout(() => switchIsland(4), 2000);
            } else {
                let nextIdx = (currentIslandIdx + 1) % 4;
                while(completedIslands.has(nextIdx)) nextIdx = (nextIdx + 1) % 4;
                say(`🌈 自動前往下一個島嶼...`);
                setTimeout(() => switchIsland(nextIdx), 2000);
            }
        } else {
            initQuestion();
        }
    }

    function resetTimer() { seconds = 0; timerInterval = setInterval(() => { seconds++; const m = Math.floor(seconds/60).toString().padStart(2,'0'), s = (seconds%60).toString().padStart(2,'0'); document.getElementById('timer-display').innerText = `${m}:${s}`; }, 1000); }
    function say(msg) { document.getElementById('msg-box').innerHTML = msg; }
    document.getElementById('answer-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') checkFinalAnswer(); });
</script>
</body>
</html>
